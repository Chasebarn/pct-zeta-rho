<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; overflow: hidden; }
  .card {
    position: relative;
    width: 1200px; height: 630px;
    background:
      radial-gradient(90% 120% at 88% -10%, #3b2559 0%, transparent 55%),
      radial-gradient(70% 90% at -5% 110%, #34204d 0%, transparent 55%),
      #241733;
    padding: 74px 84px 64px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    font-family: Inter, sans-serif;
  }
  .ghost {
    position: absolute;
    right: -60px; bottom: -110px;
    font-family: "Instrument Serif", serif;
    font-size: 430px; line-height: 0.8;
    color: transparent;
    -webkit-text-stroke: 2px rgba(201, 162, 39, 0.18);
    white-space: nowrap;
  }
  .crest { position: absolute; top: 70px; right: 84px; width: 150px; }
  .kicker {
    font-size: 24px; font-weight: 700; letter-spacing: 0.24em;
    color: #e6c65b; text-transform: uppercase;
  }
  h1 {
    font-family: "Instrument Serif", serif;
    font-weight: 400;
    font-size: 100px; line-height: 1.02; letter-spacing: -0.01em;
    color: #faf8f3;
    max-width: 940px;
  }
  h1 em { font-style: italic; color: #e6c65b; }
  .foot {
    display: flex; justify-content: space-between; align-items: baseline;
    border-top: 1px solid rgba(250, 248, 243, 0.22);
    padding-top: 26px;
  }
  .foot span {
    font-size: 20px; font-weight: 700; letter-spacing: 0.13em;
    text-transform: uppercase; color: rgba(250, 248, 243, 0.75);
    white-space: nowrap;
  }
  .foot span b { color: #e6c65b; }
</style>
</head>
<body>
  <div class="card">
    <div class="ghost">ΦΧΘ</div>
    <img class="crest" src="../crest.png">
    <div class="kicker">Phi Chi Theta · Zeta Rho Chapter</div>
    <h1>More than just a <em>business fraternity.</em></h1>
    <div class="foot">
      <span>University of South Florida · <b>Est. 2018</b></span>
      <span>Ranked <b>#3</b> Nationally</span>
    </div>
  </div>
</body>
</html>
